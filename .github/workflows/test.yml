name: Test

on:
  workflow_run:
    workflows: [Smoke]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: test-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run tests
        run: pnpm test
        env:
          CI: true

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Upload JUnit report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: junit-report
          path: test-results/junit.xml
          retention-days: 14

      - name: Fetch Allure history from GitHub Pages
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          curl -fsSL "https://hal.github.io/dave/reports/allure/history.jsonl" -o history.jsonl || true

      - name: Generate Allure report
        if: ${{ !cancelled() }}
        run: npx allure awesome allure-results --output allure-report --history-path history.jsonl

      - name: Update Allure history
        if: ${{ !cancelled() }}
        run: npx allure history allure-results --history-path history.jsonl --history-limit 50

      - name: Assemble GitHub Pages site
        if: ${{ !cancelled() }}
        run: |
          mkdir -p pages-root/reports
          cp .github/pages/index.html pages-root/
          cp -r allure-report pages-root/reports/allure
          cp -r playwright-report pages-root/reports/playwright
          cp -f history.jsonl pages-root/reports/allure/history.jsonl || true

      - name: Upload Pages artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-root/

  deploy-report:
    if: ${{ !cancelled() }}
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
