name: Test

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "playwright.config.ts"
      - "global-setup.ts"
      - "global-teardown.ts"
      - "package.json"
      - "pnpm-lock.yaml"
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run tests
        run: pnpm test
        env:
          CI: true

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Upload JUnit report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: junit-report
          path: test-results/junit.xml
          retention-days: 14

      - name: Fetch Allure history from GitHub Pages
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          PAGES_URL="https://hal.github.io/dave"
          mkdir -p allure-results/history
          for file in history.json history-trend.json duration-trend.json categories-trend.json retry-trend.json; do
            curl -fsSL "${PAGES_URL}/reports/allure/history/${file}" -o "allure-results/history/${file}" || true
          done

      - name: Generate Allure report
        if: ${{ !cancelled() }}
        run: pnpm allure:generate

      - name: Assemble GitHub Pages site
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        run: |
          mkdir -p pages-root/reports
          cp .github/pages/index.html pages-root/
          cp -r allure-report pages-root/reports/allure
          cp -r playwright-report pages-root/reports/playwright

      - name: Upload Pages artifact
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-root/

  deploy-report:
    if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
